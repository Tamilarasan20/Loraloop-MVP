version: '3.9'

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: loraloop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loraloop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loraloop_dev}
      POSTGRES_DB: ${POSTGRES_DB:-loraloop}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-loraloop}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: loraloop_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant (vector DB) ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: loraloop_qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:6333/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Zookeeper (for Kafka) ────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: loraloop_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'

  # ── Kafka ────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: loraloop_kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics --bootstrap-server localhost:9092 --list']
      interval: 30s
      timeout: 10s
      retries: 5

  # ── API (NestJS) ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      target: development
    container_name: loraloop_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-loraloop}:${POSTGRES_PASSWORD:-loraloop_dev}@postgres:5432/${POSTGRES_DB:-loraloop}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      QDRANT_URL: http://qdrant:6333
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_in_production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FRONTEND_URL: http://localhost:3001
      PORT: 3000
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/prisma:/app/prisma
    command: >
      sh -c "pnpm exec prisma migrate deploy && pnpm dev"

  # ── Web (Next.js) ────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      target: build
    container_name: loraloop_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: http://localhost:3000
      NODE_ENV: development
    ports:
      - '3001:3001'
    command: pnpm dev

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  default:
    name: loraloop_network
