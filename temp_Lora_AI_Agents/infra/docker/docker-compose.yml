version: '3.9'

networks:
  loraloop-net:
    driver: bridge

volumes:
  postgres_data:
  timescale_data:
  redis_data:
  qdrant_data:
  kafka_data:

services:

  # ==========================================
  # PRIMARY DATABASE — PostgreSQL 15
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: loraloop_postgres
    restart: unless-stopped
    networks: [loraloop-net]
    environment:
      POSTGRES_USER: loraloop
      POSTGRES_PASSWORD: loraloop_secret
      POSTGRES_DB: loraloop_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loraloop -d loraloop_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # ANALYTICS DATABASE — TimescaleDB
  # ==========================================
  timescale:
    image: timescale/timescaledb:latest-pg15
    container_name: loraloop_timescale
    restart: unless-stopped
    networks: [loraloop-net]
    environment:
      POSTGRES_USER: loraloop
      POSTGRES_PASSWORD: loraloop_secret
      POSTGRES_DB: loraloop_analytics
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loraloop -d loraloop_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # CACHE & QUEUE — Redis 7
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: loraloop_redis
    restart: unless-stopped
    networks: [loraloop-net]
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # VECTOR DATABASE — Qdrant
  # ==========================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: loraloop_qdrant
    restart: unless-stopped
    networks: [loraloop-net]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  # ==========================================
  # EVENT BUS — Kafka (KRaft mode)
  # ==========================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: loraloop_kafka
    restart: unless-stopped
    networks: [loraloop-net]
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 30s
      timeout: 10s
      retries: 5

  # ==========================================
  # KAFKA UI — for development
  # ==========================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: loraloop_kafka_ui
    restart: unless-stopped
    networks: [loraloop-net]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: loraloop-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  # ==========================================
  # REDIS UI — RedisInsight
  # ==========================================
  redis-ui:
    image: redis/redisinsight:latest
    container_name: loraloop_redis_ui
    restart: unless-stopped
    networks: [loraloop-net]
    ports:
      - "8001:5540"
    depends_on:
      - redis
