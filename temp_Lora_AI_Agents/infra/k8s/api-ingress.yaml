apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loraloop-api
  namespace: loraloop
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  tls:
    - hosts:
        - api.loraloop.ai
      secretName: loraloop-api-tls
  rules:
    - host: api.loraloop.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: loraloop-api
                port:
                  number: 3000
