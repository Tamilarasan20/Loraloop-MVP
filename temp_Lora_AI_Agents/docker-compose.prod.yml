version: '3.9'

# Production overrides — run with:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    build:
      context: ./apps/api
      target: production
    restart: always
    environment:
      NODE_ENV: production
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G

  web:
    build:
      context: ./apps/web
      target: production
    restart: always
    environment:
      NODE_ENV: production
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  postgres:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  redis:
    restart: always
    command: redis-server --save 60 1 --loglevel warning
